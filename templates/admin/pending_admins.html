{% extends "admin/dashboard.html" %}
{% block content %}

<h2 style="margin-bottom:20px;">Pending Admin Approvals</h2>

<div class="admin-card">

    {% if pending_admins %}
        <table class="admin-table">
            <tr>
                <th>Username</th>
                <th>Email</th>
                <th>Action</th>
            </tr>

            {% for profile in pending_admins %}
            <tr>
                <td>{{ profile.user.username }}</td>
                <td>{{ profile.user.email }}</td>
                <td>
                    <a href="{% url 'admin_approve_admin' profile.id %}">
                        <button class="btn-approve">Approve</button>
                    </a>
                </td>
            </tr>
            {% endfor %}
        </table>
    {% else %}
        <p style="padding:20px;">No pending admin requests.</p>
    {% endif %}

</div>

{% endblock %}
