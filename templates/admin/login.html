<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>

    <style>
        body {
            background: #111827;
            font-family: "Segoe UI", system-ui, sans-serif;
        }

        .login-box {
            background: white;
            padding: 30px;
            border-radius: 14px;
            width: 360px;
            margin: 120px auto;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            margin-top: 15px;
            padding: 12px;
            border: none;
            border-radius: 25px;
            background: linear-gradient(135deg, #6d28d9, #2563eb);
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        .error {
            color: red;
            text-align: center;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Admin Login</h2>

    {% if error_message %}
        <p class="error">{{ error_message }}</p>
    {% endif %}

    {% if messages %}
        {% for message in messages %}
            <div style="
                background:#dbeafe;
                color:#1e3a8a;
                padding:12px;
                border-radius:8px;
                margin-bottom:15px;
                text-align:center;
            ">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>
    <div style="text-align:center; margin-top:10px;">
    <a href="{% url 'admin_register' %}" style="color:#2563eb;">
        Create New Admin Account
    </a>
</div>

</div>

</body>
</html>
