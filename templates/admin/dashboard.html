<!DOCTYPE html>
<html>
<head>
   
    <title>Admin Dashboard</title>

    <style>
        
        body {
            margin: 0;
            font-family: "Segoe UI", system-ui, sans-serif;
            background: #f3f4f6;
        }

        header {
            background: linear-gradient(135deg, #111827, #1f2937);
            padding: 30px 40px;
            color: white;
            box-shadow: 0 4px 20px rgba(0,0,0,0.25);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .admin-navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .admin-logo {
            font-size: 30px;
            font-weight: bold;
            margin-right: 60px;
        }

        nav {
            flex: 1;
        }

        .nav-link {
            color: white;
            margin-right: 30px;
            text-decoration: none;
            font-weight: 500;
            transition: 0.3s ease;
            position: relative;
        }

        .nav-link::after {
            content: "";
            position: absolute;
            width: 0%;
            height: 2px;
            background: white;
            left: 0;
            bottom: -6px;
            transition: 0.3s;
        }

        .nav-link:hover::after {
            width: 100%;
        }

        .admin-actions {
            display: flex;
            gap: 15px;
        }

        .view-site {
            background: #22c55e;
            color: white;
            padding: 8px 18px;
            border-radius: 20px;
            text-decoration: none;
            transition: 0.3s ease;
        }

        .view-site:hover {
            background: #16a34a;
            transform: translateY(-2px);
        }

        .logout {
            background: #ef4444;
            color: white;
            padding: 8px 18px;
            border-radius: 20px;
            text-decoration: none;
            transition: 0.3s ease;
        }

        .logout:hover {
            background: #dc2626;
            transform: translateY(-2px);
        }

        .container {
            max-width: 1200px;
            margin: 60px auto;
            background: white;
            padding: 30px;
            border-radius: 14px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
        }

        button {
            padding: 10px 18px;
            border-radius: 25px;
            border: none;
            background: linear-gradient(135deg, #6d28d9, #2563eb);
            color: white;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(37,99,235,0.4);
        }

        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }


.primary-btn {
    display: inline-block;
    margin-bottom: 20px;
    padding: 10px 20px;
    border-radius: 25px;
    background: linear-gradient(135deg, #6d28d9, #2563eb);
    color: white;
    text-decoration: none;
    font-weight: 600;
    transition: 0.3s;
}

.primary-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(37,99,235,0.4);
}

.admin-table table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    border-radius: 12px;
    overflow: hidden;
}

.admin-table th, .admin-table td {
    padding: 14px 16px;
    border-bottom: 1px solid #eee;
    text-align: left;
}

.admin-table th {
    background: #f9fafb;
    font-weight: 600;
}

.status {
    padding: 4px 10px;
    border-radius: 15px;
    font-size: 12px;
    font-weight: 600;
}

.status.published {
    background: #dcfce7;
    color: #166534;
}

.status.draft {
    background: #fee2e2;
    color: #991b1b;
}


/*ACTION BUTTONS - EDIT, DELETE*/
.action-btn {
    padding: 7px 16px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    text-decoration: none;
    margin-right: 5px;
    border: none;
    cursor: pointer;
    transition: all 0.25s ease;
}

.btn-edit {
    background: #dbeafe;
    color: #1d4ed8;
}

.btn-edit:hover {
    background: #bfdbfe;
    transform: translateY(-2px);
}

.btn-delete {
    background: #fee2e2;
    color: #dc2626;
}

.btn-delete:hover {
    background: #fecaca;
    transform: translateY(-2px);
}

/*Admins*/
.admin-card {
    background: white;
    padding: 25px;
    border-radius: 14px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

.admin-table {
    width: 100%;
    border-collapse: collapse;
}

.admin-table th {
    text-align: left;
    padding: 12px;
    background: #f3f4f6;
    font-weight: 600;
}

.admin-table td {
    padding: 12px;
    border-bottom: 1px solid #eee;
}

.admin-table tr:hover {
    background: #f9fafb;
}
/* Role badges */
.badge-super {
    background: #111827;
    color: white;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 12px;
}

.badge-admin {
    background: #3b82f6;
    color: white;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 12px;
}
    </style>

</head>

<body>

<header>
    
    <div class="admin-navbar">

        <div class="admin-logo">Admin Panel</div>

        <nav>
            <a href="{% url 'admin_dashboard' %}" class="nav-link">Dashboard</a>
            <a href="{% url 'admin_notice_list' %}" class="nav-link">Notices</a>
            <a href="{% url 'admin_category_list' %}" class="nav-link">Categories</a>
            <a href="{% url 'admin_department_list' %}" class="nav-link">Departments</a>
            <a href="{% url 'admin_subscription_list' %}" class="nav-link">Subscriptions</a>
            <a href="{% url 'admin_pending_admins' %}" class="nav-link">Pending Admins</a>
            <a href="{% url 'admin_admin_list' %}" class="nav-link">Admins</a>


        </nav>

        <div class="admin-actions">
            <a href="/" target="_blank" class="view-site">View Notice Board</a>
            <a href="{% url 'admin_logout' %}" class="logout"
               onclick="return confirm('Are you sure you want to log out?');">
               Logout
            </a>
        </div>

    </div>
</header>

<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
