{% extends "admin/dashboard.html" %}
{% block content %}

<h2>Categories</h2>

<a href="{% url 'admin_category_add' %}">
    <button>+ Add Category</button>
</a>

<table style="width:100%; margin-top:20px; border-collapse: collapse;">
    <thead>
        <tr style="background:#f3f4f6;">
            <th style="padding:12px; text-align:left;">Name</th>
            <th style="padding:12px; text-align:left;">Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for c in categories %}
        <tr style="border-bottom:1px solid #eee;">
            <td style="padding:12px;">{{ c.name }}</td>
            <td style="padding:12px;">  
                <a href="{% url 'admin_category_edit' c.id %}" class="action-btn btn-edit">Edit
                </a>

                <a href="{% url 'admin_category_delete' c.id %}"
                onclick="return confirm('Delete this category?');" class="action-btn btn-delete">Delete
                </a>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="2" style="padding:12px;">No categories added yet.</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
