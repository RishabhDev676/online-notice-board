{% extends "admin/dashboard.html" %}
{% block content %}

<h2>{% if department %}Edit{% else %}Add{% endif %} Department</h2>

<form method="post">
    {% csrf_token %}

    <label>Name</label>
    <input type="text" name="name"
           value="{{ department.name|default:'' }}" required>

    <br><br>
    <button type="submit">
        {% if department %}Update{% else %}Add{% endif %}
    </button>
</form>

{% endblock %}
